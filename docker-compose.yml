services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orfc
      POSTGRES_USER: orfc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orfc"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3141}:3141"
    environment:
      DATABASE_URL: postgresql://orfc:${POSTGRES_PASSWORD:-changeme}@db:5432/orfc
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3141}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3141}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@localhost}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
